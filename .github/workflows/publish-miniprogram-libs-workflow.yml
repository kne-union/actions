on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      APP_ID:
        required: true
        type: string
      PRIVATE_KEY_NAME:
        required: true
        type: string
      TOKEN_SECRET_NAME:
        required: true
        type: string
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: 24
      - run: npm i 
      - run: npm run init
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: build-dist
          path: |
            ./dist
            ./package.json
            ./README.md
      - uses: actions/upload-artifact@v6
        with:
          name: example-dist
          path: |
            ./example/dist
            ./example/package.json
            ./package.json
            ./example/project.config.json
  publish-miniprogram:
    needs: build
    uses: kne-union/actions/.github/workflows/publish-miniprogram-workflow.yml@master
    secrets: inherit
    with:
      artifact: example-dist
      PROJECT_DIR: ./example
      APP_ID: ${{inputs.APP_ID}}
      PRIVATE_KEY_NAME: ${{inputs.PRIVATE_KEY_NAME}}
  publish-npm:
    needs: build
    uses: kne-union/actions/.github/workflows/publish-npm-workflow.yml@master
    secrets: inherit
    with:
      package_name: ${{inputs.package_name}}
  sync-static-data:
    runs-on: ubuntu-latest
    needs: publish-npm
    timeout-minutes: 5
    steps:
      - uses: kne-union/actions-manifest@master
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
  publish-qrcode:
    needs: publish-miniprogram
    uses: kne-union/actions/.github/workflows/publish-miniprogram-qrcode.yml@master
    secrets: inherit
    with:
      APP_ID: ${{inputs.APP_ID}}
      TOKEN_SECRET_NAME: ${{inputs.TOKEN_SECRET_NAME}}
  release:
    needs: publish-npm
    uses: kne-union/actions/.github/workflows/npm-release-workflow.yml@master
    secrets: inherit
    with:
      package_name: ${{inputs.package_name}}
