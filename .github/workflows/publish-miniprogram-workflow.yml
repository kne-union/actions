on:
  workflow_call:
    inputs:
      artifact:
        required: false
        type: string
        default:
          build-dist
      PROJECT_DIR:
        required: false
        type: string
        default: ./
      APP_ID:
        required: true
        type: string
      PRIVATE_KEY_NAME:
        required: true
        type: string
permissions:
  contents: read

jobs:
  publish-miniprogram:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: ${{inputs.artifact}}
          path: ./
      - uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: 24
      - run: npx @kne/miniprogram-tools
        env:
          PROJECT_DIR: ${{inputs.PROJECT_DIR}}
          APP_ID: ${{inputs.APP_ID}}
          PRIVATE_KEY: ${{ secrets[inputs.PRIVATE_KEY_NAME] }}
