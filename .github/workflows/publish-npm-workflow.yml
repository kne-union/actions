on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      artifact:
        required: false
        type: string
        default: build-dist
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: ${{inputs.artifact}}
          path: ./
      - uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: 24
      - name: Determine publish tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            TAG=$(echo "$VERSION" | sed -n 's/^[^-]*-\([^.]*\).*/\1/p')
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Prerelease detected: $VERSION, will publish with tag: $TAG"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Stable release: $VERSION, will publish with default tag"
          fi
      - name: Publish Npm
        env:
          NODE_AUTH_TOKEN: ${{secrets.KNE_PACKAGE_PUBLISH}}
        run: |
          ARGS="--provenance --access=public"
          if [ "${{ steps.tag.outputs.tag }}" != "latest" ]; then
            ARGS="$ARGS --tag ${{ steps.tag.outputs.tag }}"
          fi
          npm publish $ARGS
  sync-cnpm:
    runs-on: ubuntu-latest
    needs: publish
    continue-on-error: true
    steps:
      - name: Sync To Cnpm
        continue-on-error: true
        timeout-minutes: 2
        run: timeout 100 npx cnpm sync ${{inputs.package_name}} || true
