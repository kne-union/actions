on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: 24
      - run: npm i 
      - run: npm run build

      - name: Deploy to GH Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build

      - name: Auto Version
        run: npx @kne/npm-tools nextPatchVersion

      - uses: actions/upload-artifact@v6
        with:
          name: build-dist
          path: |
            ./build
            ./package.json
  publish-npm:
    needs: build
    uses: kne-union/actions/.github/workflows/publish-npm-workflow.yml@master
    secrets: inherit
    with:
      package_name: ${{inputs.package_name}}
  sync-static-data:
    runs-on: ubuntu-latest
    needs: publish-npm
    timeout-minutes: 5
    steps:
      - uses: kne-union/actions-manifest@master
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
  sync-uc:
    runs-on: ubuntu-latest
    needs: sync-static-data
    timeout-minutes: 2
    continue-on-error: true
    steps:
      - name: Sync To UC
        run: |
          curl --header "Content-Type: application/json" --request POST --data "{\"PACKAGE_NAME\":\"${{inputs.package_name}}\"}" ${{secrets.SYNC_WEB_HOOK}}
  release:
    needs: publish-npm
    uses: kne-union/actions/.github/workflows/npm-release-workflow.yml@master
    secrets: inherit
    with:
      package_name: ${{inputs.package_name}}
